<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHLUHIKOIN PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00f2ff; --bg: #0a0b10; --card: #1c1e29; }
        body { background: radial-gradient(circle at top, #1a1c2c 0%, #0a0b10 100%); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        #selection-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; }
        .opt { width: 120px; height: 120px; background: var(--card); border: 2px solid #333; border-radius: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .opt img { width: 80%; height: 80%; object-fit: contain; }
        #game-screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .balance { font-size: 50px; font-weight: 900; margin-top: 50px; text-shadow: 0 0 20px var(--accent); }
        .coin-wrap { margin: 40px 0; width: 250px; height: 250px; position: relative; }
        #main-coin { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(145deg, #ffd700, #b8860b); border: 8px solid #fff3bf; box-shadow: 0 10px 0 #856b00; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        #main-coin:active { transform: translateY(5px); box-shadow: 0 5px 0 #856b00; }
        #main-coin img { width: 70%; height: 70%; pointer-events: none; }
        .shop-btn { position: fixed; bottom: 30px; width: 80%; background: var(--accent); color: #000; padding: 15px; border-radius: 20px; font-weight: bold; text-align: center; }
        #shop-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%; background: #111; border-top: 2px solid var(--accent); border-radius: 30px 30px 0 0; transition: 0.3s; padding: 20px; box-sizing: border-box; z-index: 2000; }
        #shop-modal.active { bottom: 0; }
        .item { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <h2>ВЫБЕРИ МОНЕТУ</h2>
        <div class="grid">
            <div class="opt" onclick="confirmSelection('1.png')"><img src="images/1.png"></div>
            <div class="opt" onclick="confirmSelection('2.png')"><img src="images/2.png"></div>
            <div class="opt" onclick="confirmSelection('3.png')"><img src="images/3.png"></div>
            <div class="opt" onclick="confirmSelection('4.png')"><img src="images/4.png"></div>
            <div class="opt" onclick="confirmSelection('5.png')"><img src="images/5.png"></div>
            <div class="opt" onclick="confirmSelection('6.png')"><img src="images/6.png"></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="balance" id="bal">0</div>
        <div class="coin-wrap"><div id="main-coin" onclick="tap(event)"></div></div>
        <div class="shop-btn" onclick="openShop(true)">МАГАЗИН</div>
    </div>

    <div id="shop-modal" id="shop">
        <div style="display:flex; justify-content: space-between">
            <h3>МАГАЗИН</h3>
            <h3 onclick="openShop(false)">×</h3>
        </div>
        <div id="itemList"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let s = { bal: 0, ipc: 1, ips: 0, coin: null };

        function confirmSelection(img) {
            s.coin = img;
            start();
        }

        function start() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').
style.display = 'flex';
            document.getElementById('main-coin').innerHTML = <img src="images/${s.coin}">;
            update();
            setInterval(() => { if(s.ips > 0) { s.bal += s.ips/10; update(); } }, 100);
        }

        function tap(e) {
            s.bal += s.ipc;
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            update();
        }

        function openShop(show) {
            document.getElementById('shop-modal').classList.toggle('active', show);
        }

        function update() {
            document.getElementById('bal').innerText = Math.floor(s.bal).toLocaleString();
        }
    </script>
</body>
</html>
